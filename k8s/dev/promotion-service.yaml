apiVersion: apps/v1
kind: Deployment
metadata:
  name: promotion-service
  namespace: circleguard-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: promotion-service
  template:
    metadata:
      labels:
        app: promotion-service
    spec:
      containers:
        - name: promotion-service
          image: circleguard/promotion-service:dev
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: dev
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/circleguard
            - name: SPRING_DATASOURCE_USERNAME
              value: circleguard
            - name: SPRING_DATASOURCE_PASSWORD
              value: circleguard
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
            - name: SPRING_DATA_REDIS_HOST
              value: redis
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: promotion-service
  namespace: circleguard-dev
spec:
  selector:
    app: promotion-service
  ports:
    - port: 8080
      targetPort: 8080
